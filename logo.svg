<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="16" ry="16" fill="#0f1729"/>

  <!-- depth 0: vertical split through root point -->
  <line x1="128" y1="28" x2="128" y2="228" stroke="#3b82f6" stroke-width="1.5" opacity="0.45"/>

  <!-- depth 1: horizontal splits -->
  <line x1="28" y1="95" x2="128" y2="95" stroke="#3b82f6" stroke-width="1.2" opacity="0.35"/>
  <line x1="128" y1="160" x2="228" y2="160" stroke="#3b82f6" stroke-width="1.2" opacity="0.35"/>

  <!-- depth 2: vertical splits -->
  <line x1="70" y1="28" x2="70" y2="95" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>
  <line x1="85" y1="95" x2="85" y2="228" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>
  <line x1="175" y1="28" x2="175" y2="160" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>
  <line x1="192" y1="160" x2="192" y2="228" stroke="#3b82f6" stroke-width="0.8" opacity="0.25"/>

  <!-- split points (nodes of the tree, sitting on their split lines) -->
  <circle cx="128" cy="128" r="4.5" fill="#60a5fa"/>
  <circle cx="70" cy="58" r="4" fill="#60a5fa" opacity="0.85"/>
  <circle cx="85" cy="155" r="4" fill="#60a5fa" opacity="0.85"/>
  <circle cx="175" cy="85" r="4" fill="#60a5fa" opacity="0.85"/>
  <circle cx="192" cy="195" r="3.5" fill="#60a5fa" opacity="0.75"/>

  <!-- leaf points -->
  <circle cx="42" cy="48" r="3.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="100" cy="72" r="3.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="50" cy="145" r="3" fill="#60a5fa" opacity="0.5"/>
  <circle cx="110" cy="198" r="3" fill="#60a5fa" opacity="0.5"/>
  <circle cx="148" cy="55" r="3.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="210" cy="118" r="3" fill="#60a5fa" opacity="0.5"/>
  <circle cx="152" cy="200" r="3" fill="#60a5fa" opacity="0.5"/>
  <circle cx="215" cy="185" r="3" fill="#60a5fa" opacity="0.5"/>

  <!-- nearest-neighbor query: amber point with dashed search radius -->
  <circle cx="158" cy="70" r="38" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
  <circle cx="158" cy="70" r="3" fill="#f59e0b"/>
</svg>
